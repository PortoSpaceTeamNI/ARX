services:
  frontend:
    build:
      context: frontend
      target: prod
    ports:
      - "3000:80"
    profiles: ["prod"]

  frontend-dev:
    build:
      context: frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    profiles: ["dev"]

  frontend-test:
    build:
      context: frontend
      target: test
    volumes:
      - ./frontend:/app
      - /app/node_modules
    profiles: ["test"]

  backend-dev:
    build:
      context: backend
      target: dev
    privileged: true
    volumes:
      - ./backend:/app
      - /dev:/dev
    ports:
      - "8080:8080"
    profiles: ["dev"]

  grafana:
    build:
      context: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    profiles: ["dev"]